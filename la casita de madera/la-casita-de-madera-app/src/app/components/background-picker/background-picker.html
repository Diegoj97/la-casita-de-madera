<div class="rounded-lg border border-stone-200 bg-white p-6">
  <h2 class="mb-4 text-lg font-semibold text-stone-900">Background Image</h2>

  <div class="grid grid-cols-2 gap-3 sm:grid-cols-3">
    <button
      type="button"
      (click)="select('')"
      class="relative overflow-hidden rounded-lg border-2 text-left transition"
      [class.border-amber-600]="selected() === ''"
      [class.border-stone-200]="selected() !== ''"
      [class.ring-2]="current() === ''"
      [class.ring-green-400]="current() === ''"
    >
      <div class="flex h-20 w-full items-center justify-center bg-stone-100 text-stone-400">
        None
      </div>
      <span class="block px-2 py-1 text-xs text-stone-600">None</span>
    </button>

    @for (bg of backgrounds(); track bg.id) {
      <div
        class="group relative overflow-hidden rounded-lg border-2 transition"
        [class.border-amber-600]="selected() === bg.url"
        [class.border-stone-200]="selected() !== bg.url"
        [class.ring-2]="current() === bg.url"
        [class.ring-green-400]="current() === bg.url"
      >
        <button
          type="button"
          (click)="select(bg.url)"
          class="block w-full text-left"
        >
          <img [src]="bg.url" [alt]="bg.label" class="h-20 w-full object-cover" />
          <span class="block px-2 py-1 text-xs text-stone-600">{{ bg.label }}</span>
        </button>
        <button
          type="button"
          (click)="remove(bg.id)"
          title="Eliminar imagen"
          class="absolute right-1 top-1 rounded-full bg-red-600/90 p-1 text-white opacity-0 transition group-hover:opacity-100 hover:bg-red-700"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
        </button>
      </div>
    }
  </div>

  <label class="mt-4 inline-flex cursor-pointer items-center gap-2 rounded-lg border border-stone-300 px-4 py-2 text-sm text-stone-600 transition hover:bg-stone-100">
    <span>{{ isUploading() ? 'Subiendo...' : 'Subir nueva imagen' }}</span>
    <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" [disabled]="isUploading()" />
  </label>

  <div class="mt-4 flex items-center gap-3">
    <button
      type="button"
      (click)="confirm()"
      [disabled]="!hasPending()"
      class="rounded-lg bg-amber-700 px-4 py-2 text-sm text-white transition hover:bg-amber-800 disabled:cursor-not-allowed disabled:opacity-40"
    >
      Aceptar
    </button>
    <button
      type="button"
      (click)="cancel()"
      [disabled]="!hasPending()"
      class="rounded-lg border border-stone-300 px-4 py-2 text-sm text-stone-600 transition hover:bg-stone-100 disabled:cursor-not-allowed disabled:opacity-40"
    >
      Cancelar
    </button>
    @if (current()) {
      <span class="ml-auto text-sm text-stone-500">
        Actual: <code class="text-xs text-stone-600">{{ current() }}</code>
      </span>
    }
  </div>
</div>
