<div class="rounded-lg border border-stone-200 bg-white p-4">
  <label class="block text-sm font-medium text-stone-700 mb-2">{{ label() }}</label>
  
  @if (currentUrl()) {
    <div class="mb-4">
      <img [src]="currentUrl()" alt="Current image" class="h-32 w-auto object-cover rounded border" />
    </div>
  }

  <div class="flex items-center gap-4">
    <label class="cursor-pointer rounded-lg bg-stone-100 px-4 py-2 text-sm font-medium text-stone-700 hover:bg-stone-200">
      <span [class.opacity-50]="isUploading()">
        {{ isUploading() ? 'Uploading...' : 'Choose File' }}
      </span>
      <input type="file" class="hidden" accept="image/*" (change)="onFileSelected($event)" [disabled]="isUploading()" />
    </label>
    
    @if (error()) {
      <span class="text-sm text-red-600">{{ error() }}</span>
    }
  </div>
</div>
