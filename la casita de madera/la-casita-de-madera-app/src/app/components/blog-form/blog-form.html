<form [formGroup]="form" (ngSubmit)="onSubmit()" class="mx-auto max-w-2xl space-y-6">
  <div>
    <label for="title" class="mb-1 block text-sm font-medium text-stone-700">Title</label>
    <input
      id="title"
      formControlName="title"
      class="w-full rounded-lg border border-stone-300 px-4 py-2 focus:border-amber-500 focus:outline-none"
    />
  </div>

  <div>
    <label for="slug" class="mb-1 block text-sm font-medium text-stone-700">Slug</label>
    <input
      id="slug"
      formControlName="slug"
      class="w-full rounded-lg border border-stone-300 px-4 py-2 focus:border-amber-500 focus:outline-none"
    />
  </div>

  <div>
    <label for="content" class="mb-1 block text-sm font-medium text-stone-700">Content</label>
    <textarea
      id="content"
      formControlName="content"
      rows="10"
      class="w-full rounded-lg border border-stone-300 px-4 py-2 focus:border-amber-500 focus:outline-none"
    ></textarea>
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label for="excerpt" class="mb-1 block text-sm font-medium text-stone-700">Excerpt</label>
      <input
        id="excerpt"
        formControlName="excerpt"
        class="w-full rounded-lg border border-stone-300 px-4 py-2 focus:border-amber-500 focus:outline-none"
      />
    </div>
    <div>
      <label for="author" class="mb-1 block text-sm font-medium text-stone-700">Author</label>
      <input
        id="author"
        formControlName="author"
        class="w-full rounded-lg border border-stone-300 px-4 py-2 focus:border-amber-500 focus:outline-none"
      />
    </div>
  </div>

  <div>
    <label for="image" class="mb-1 block text-sm font-medium text-stone-700">Image (from your device)</label>
    <input
      id="image"
      type="file"
      accept="image/*"
      (change)="onFileSelected($event)"
      class="w-full rounded-lg border border-stone-300 px-4 py-2 focus:border-amber-500 focus:outline-none"
    />
    @if (uploading()) {
      <p class="mt-1 text-sm text-amber-700">Uploading image…</p>
    }
    @if (uploadError()) {
      <p class="mt-1 text-sm text-red-600">{{ uploadError() }}</p>
    }
    @if (previewUrl(); as url) {
      <img [src]="url" alt="Preview" class="mt-3 max-h-48 rounded-lg border border-stone-200 object-cover" />
    }
    <input type="hidden" formControlName="image_url" />
  </div>

  <div>
    <label for="tags" class="mb-1 block text-sm font-medium text-stone-700">Tags (comma separated)</label>
    <input
      id="tags"
      formControlName="tags"
      class="w-full rounded-lg border border-stone-300 px-4 py-2 focus:border-amber-500 focus:outline-none"
    />
  </div>

  <div class="flex items-center gap-2">
    <input
      id="published"
      type="checkbox"
      formControlName="published"
      class="h-4 w-4 rounded border-stone-300 text-amber-600"
    />
    <label for="published" class="text-sm text-stone-700">Published</label>
  </div>

  <div class="flex gap-4">
    <button
      type="submit"
      class="rounded-lg bg-amber-700 px-6 py-2 text-white transition hover:bg-amber-800"
    >
      {{ submitLabel() }}
    </button>
    <button
      type="button"
      (click)="onCancel()"
      class="rounded-lg border border-stone-300 px-6 py-2 text-stone-600 transition hover:bg-stone-100"
    >
      Cancel
    </button>
  </div>
</form>
