<div class="rounded-lg border border-stone-200 bg-white p-6">
  <h2 class="mb-4 text-lg font-semibold text-stone-900">
    {{ submitLabel() === 'Update' ? 'Editar Producto' : 'Nuevo Producto' }}
  </h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <div class="grid gap-4 md:grid-cols-2">
      <div>
        <label class="block text-sm font-medium text-stone-700">Nombre</label>
        <input type="text" formControlName="name" class="mt-1 block w-full rounded-md border-stone-300 shadow-sm focus:border-amber-500 focus:ring-amber-500 sm:text-sm" />
      </div>
      <div>
        <label class="block text-sm font-medium text-stone-700">Slug</label>
        <input type="text" formControlName="slug" class="mt-1 block w-full rounded-md border-stone-300 shadow-sm focus:border-amber-500 focus:ring-amber-500 sm:text-sm" />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-stone-700">Descripción</label>
      <textarea rows="6" formControlName="description" class="mt-1 block w-full rounded-md border-stone-300 shadow-sm focus:border-amber-500 focus:ring-amber-500 sm:text-sm"></textarea>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <div>
        <label class="block text-sm font-medium text-stone-700">Extracto</label>
        <input type="text" formControlName="excerpt" class="mt-1 block w-full rounded-md border-stone-300 shadow-sm focus:border-amber-500 focus:ring-amber-500 sm:text-sm" />
      </div>
      <div>
        <label class="block text-sm font-medium text-stone-700">Precio (€)</label>
        <input type="number" step="0.01" formControlName="price" class="mt-1 block w-full rounded-md border-stone-300 shadow-sm focus:border-amber-500 focus:ring-amber-500 sm:text-sm" />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-stone-700">Etiquetas (separadas por coma)</label>
      <input type="text" formControlName="tags" class="mt-1 block w-full rounded-md border-stone-300 shadow-sm focus:border-amber-500 focus:ring-amber-500 sm:text-sm" />
    </div>

    <div>
      <label class="block text-sm font-medium text-stone-700">Imágenes</label>
      <div class="mt-2 flex flex-wrap gap-3">
        @for (img of images(); track img) {
          <div class="relative h-24 w-24">
            <img [src]="img" alt="Imagen del producto" class="h-24 w-24 rounded-lg object-cover shadow-sm" />
            <button
              type="button"
              (click)="removeImage($index)"
              class="absolute -right-2 -top-2 flex h-6 w-6 items-center justify-center rounded-full bg-red-600 text-xs font-bold text-white shadow hover:bg-red-700"
              aria-label="Quitar imagen"
            >
              ×
            </button>
            @if ($index === 0) {
              <span class="absolute bottom-1 left-1 rounded bg-amber-700 px-1.5 py-0.5 text-[10px] font-semibold text-white">
                Portada
              </span>
            }
          </div>
        }
        @if (images().length === 0) {
          <div class="flex h-24 w-24 items-center justify-center rounded-lg border-2 border-dashed border-stone-300 text-stone-400">
            <span class="text-xs text-center">Sin fotos</span>
          </div>
        }
      </div>

      <button
        type="button"
        (click)="fileInput.click()"
        class="mt-3 rounded-lg bg-amber-100 px-4 py-2 text-sm font-semibold text-amber-800 hover:bg-amber-200"
      >
        {{ images().length === 0 ? 'Añadir fotos' : 'Añadir más fotos' }}
      </button>
      <input
        #fileInput
        type="file"
        accept="image/*"
        multiple
        class="hidden"
        (change)="onFilesSelected($event)"
      />

      @if (uploading()) {
        <p class="mt-1 text-xs text-amber-600">Subiendo imágenes…</p>
      }
      @if (uploadError(); as err) {
        <p class="mt-1 text-xs text-red-500">{{ err }}</p>
      }
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" formControlName="available" class="rounded border-stone-300 text-amber-600 focus:ring-amber-500" />
      <label class="text-sm font-medium text-stone-700">Disponible</label>
    </div>

    <div class="flex gap-3 pt-2">
      <button
        type="submit"
        [disabled]="form.invalid"
        class="rounded-lg bg-amber-700 px-4 py-2 text-sm text-white hover:bg-amber-800 disabled:opacity-50"
      >
        {{ submitLabel() }}
      </button>
      <button
        type="button"
        (click)="onCancel()"
        class="rounded-lg border px-4 py-2 text-sm hover:bg-stone-100"
      >
        Cancelar
      </button>
    </div>
  </form>
</div>
